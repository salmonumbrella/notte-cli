version: 2

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - goimports

formatters:
  enable:
    - gofumpt

linters-settings:
  goimports:
    local-prefixes: github.com/salmonumbrella/notte-cli

issues:
  exclude-dirs:
    - internal/api  # Generated code
